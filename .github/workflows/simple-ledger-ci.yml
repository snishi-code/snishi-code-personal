name: simple-ledger CI

on:
  push:
    paths:
      - 'apps/simple-ledger/**'
      - 'packages/foundation/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig*.json'
      - 'eslint.config.js'
      - 'build.sh'
      - '.github/workflows/simple-ledger-ci.yml'
  pull_request:
    paths:
      - 'apps/simple-ledger/**'
      - 'packages/foundation/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig*.json'
      - 'eslint.config.js'
      - 'build.sh'
      - '.github/workflows/simple-ledger-ci.yml'

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - name: typecheck
        run: npm run typecheck
      - name: lint
        run: npm run lint
      - name: format:check
        run: npm run format:check
      - name: test (Vitest)
        run: npm test --workspaces --if-present
      - name: no-exfil
        run: npm run no-exfil
      - name: build app
        run: npm run build --workspace simple-ledger
      - name: build deploy artifact
        run: SKIP_NPM_CI=1 bash build.sh

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - name: Playwright ブラウザ導入（chromium）
        run: npx playwright install --with-deps chromium
      - name: E2E（主要フロー / PL・BS / a11y axe / PWA / 外部送信ゼロ）
        run: npm run test:e2e --workspace simple-ledger -- --project=chromium
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: apps/simple-ledger/playwright-report/
          retention-days: 7
          if-no-files-found: ignore
